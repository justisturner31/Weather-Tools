<script>
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "#5b6cff",
    "dark": false,
    "density": "comfy",
    "grid": "hairline",
    "zebra": true,
    "font": "Inter"
  }/*EDITMODE-END*/;
  const listeners = new Set();
  window.subscribeTweaks = (fn) => { listeners.add(fn); fn(TWEAKS); return () => listeners.delete(fn); };
  const notify = () => listeners.forEach(fn => fn({ ...TWEAKS }));
  function persist(edits) { try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch {} }
  function setTweak(k, v) { TWEAKS[k] = v; syncUI(); notify(); persist({ [k]: v }); }
  function syncUI() {
    document.querySelectorAll('[data-tw]').forEach(el => {
      const v = String(TWEAKS[el.dataset.tw]);
      if (el.dataset.val !== undefined) el.classList.toggle('active', el.dataset.val === v);
    });
    document.querySelectorAll('.tw-swatch').forEach(el => {
      el.classList.toggle('active', el.dataset.color === TWEAKS.accent);
    });
  }
  const accents = ['#5b6cff','#e26a3c','#2aa78a','#a04bff','#d23b7a','#1a1d23'];
  const wrap = document.getElementById('tw-accent');
  accents.forEach(c => {
    const sw = document.createElement('div'); sw.className='tw-swatch';
    sw.dataset.color=c; sw.style.background=c; sw.onclick=()=>setTweak('accent',c);
    wrap.appendChild(sw);
  });
  document.querySelectorAll('[data-tw][data-val]').forEach(el => {
    el.onclick = () => { let v = el.dataset.val; if(v==='true')v=true; else if(v==='false')v=false; setTweak(el.dataset.tw, v); };
  });
  syncUI();

  const panel = document.getElementById('tweaks-panel');
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode')   panel.classList.add('open');
    if (d.type === '__deactivate_edit_mode') panel.classList.remove('open');
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
</script>

<script type="text/babel">
// Shared dataset for the Weather Prediction Tool Tracker
// Models tracked: NWS, HRRR, Climb (composite), Tool (the user's own),
// Weather Avg, Pressure Tendency signal. Rows = date/city predictions.

const WEATHER_ROWS = [
  { id: 1, date: '2026-04-18', city: 'Miami',         toolHigh: 86, range: '86-87', nws: 83, fcstAvg: 86, actual: 86, result: 'On',     conf: 0.78, notes: 'Pressure steady; clear skies all day.' },

  { id: 4, date: '2026-04-18', city: 'Las Vegas',     toolHigh: 88, range: '87-89', nws: 86, fcstAvg: 87, actual: 89, result: 'Within', conf: 0.81, notes: 'Dry NW flow.' },

  { id: 6, date: '2026-04-19', city: 'LA',            toolHigh: 67, range: 'Skip',  nws: null, fcstAvg: null, actual: 68, result: 'Skip',   conf: null,  notes: 'Low conviction; sat out.' },

  { id:11, date: '2026-04-20', city: 'Phoenix',       toolHigh: 98, range: '97-99', nws: 96, fcstAvg: 96, actual: 99, result: 'Within', conf: 0.76, notes: 'Heat dome edge.' },
  { id:12, date: '2026-04-20', city: 'Las Vegas',     toolHigh: 90, range: '89-91', nws: 88, fcstAvg: 89, actual: 91, result: 'Within', conf: 0.79, notes: 'Mid-level ridge building.' },
  { id:13, date: '2026-04-21', city: 'Miami',         toolHigh: 84, range: '83-85', nws: 82, fcstAvg: 83, actual: 84, result: 'On',     conf: 0.82, notes: '' },
  { id:14, date: '2026-04-21', city: 'LA',            toolHigh: 68, range: '67-69', nws: 67, fcstAvg: 68, actual: 68, result: 'On',     conf: 0.79, notes: 'Deep marine layer burned off.' },
  { id:15, date: '2026-04-21', city: 'Phoenix',       toolHigh: 95, range: '94-96', nws: 94, fcstAvg: 93, actual: 95, result: 'On',     conf: 0.86, notes: '' },
  { id:16, date: '2026-04-21', city: 'Philadelphia',  toolHigh: 72, range: '71-73', nws: 70, fcstAvg: 71, actual: 73, result: 'Within', conf: 0.74, notes: 'Warm front pass.' },
];

// Result → visual mapping. On = matched the point prediction (hardest win);
// Within = inside the predicted 2°F range; Over/Under = missed by direction;
// Skip = didn't bet.
const RESULT_META = {
  'On':     { label: 'On prediction', tone: 'good',    dot: '●' },
  'Within': { label: 'Within range',  tone: 'ok',      dot: '●' },
  'Over':   { label: 'Actual over',   tone: 'warn',    dot: '▲' },
  'Under':  { label: 'Actual under',  tone: 'warn',    dot: '▼' },
  'Skip':   { label: 'Skipped',       tone: 'muted',   dot: '—' },
};

const CITIES = [
  // Weather Tool v2.16: 5-station Kalshi tool
  'Las Vegas', 'LA', 'Phoenix', 'Miami', 'Philadelphia',
];

// Aggregate accuracy by model (computed from tracked rows, excl. Skip).
function computeStats(rows) {
  const active = rows.filter(r => r.result !== 'Skip' && r.actual != null);
  const hit = active.filter(r => r.result === 'On' || r.result === 'Within').length;
  const onPoint = active.filter(r => r.result === 'On').length;
  const absErr = (key) => {
    const errs = active.filter(r => r[key] != null).map(r => Math.abs(r[key] - r.actual));
    return errs.length ? errs.reduce((a,b)=>a+b,0) / errs.length : null;
  };
  return {
    tracked: rows.length,
    active: active.length,
    skipped: rows.length - active.length,
    hitRate: active.length ? hit / active.length : 0,
    onPointRate: active.length ? onPoint / active.length : 0,
    toolMAE: absErr('toolHigh'),
    nwsMAE:  absErr('nws'),
    avgMAE:  absErr('fcstAvg'),
    avgConf: (() => {
      const cs = rows.filter(r => r.conf != null).map(r => r.conf);
      return cs.length ? cs.reduce((a,b)=>a+b,0) / cs.length : 0;
    })(),
  };
}

Object.assign(window, { WEATHER_ROWS, RESULT_META, CITIES, computeStats });

</script>
<script type="text/babel">
// Export & automation helpers — called from both trackers' toolbars.

function rowsToCSV(rows) {
  const cols = ['id','date','city','station','version','toolHigh','range','nws','fcstAvg','actual','result','conf','notes',
    'sentiment','lean','season','currentTemp','temp7am','windDir7am','windDir','windSpeed','windSpeedVal','dewPoint','humidity','overnightLow',
    'pressureLabel','pressureChange','tempTrajectory','tempRate','solar','humidTrend','cloudCover','precipProb','fetchMin',
    // v2 enrichments
    'climb','climbCap','hrrr','gfs','nam','icon','consensus','nwsBias',
    'usAqi','pm25','aod','ozone','no2','smoke','radar',
    'precipNow','precipMax','rainDay','biasMode','stationExtra','stationNotes',
    // Station-specific regimes
    'marineLayer','santaAna','eddy','monsoon','seaBreezeEta',
    'schema'];
  const esc = (v) => {
    if (v == null) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const header = cols.join(',');
  const body = rows.map(r => {
    const raw = r.raw || {};
    const extended = { ...r, ...raw };
    return cols.map(k => esc(extended[k])).join(',');
  }).join('\n');
  return header + '\n' + body;
}

function rowsToMarkdown(rows, stats) {
  const head = `# Weather Tool Tracker — export\n\n` +
    `Generated: ${new Date().toISOString()}\n\n` +
    `## Summary\n` +
    `- Rows tracked: **${stats.tracked}** (active ${stats.active}, skipped ${stats.skipped})\n` +
    `- Hit rate (On + Within): **${(stats.hitRate*100).toFixed(1)}%**\n` +
    `- On-prediction (exact): **${(stats.onPointRate*100).toFixed(1)}%**\n` +
    `- Tool MAE: **${stats.toolMAE != null ? stats.toolMAE.toFixed(2)+'°F' : 'n/a'}** · NWS MAE: **${stats.nwsMAE != null ? stats.nwsMAE.toFixed(2)+'°F' : 'n/a'}** · Forecast-avg MAE: **${stats.avgMAE != null ? stats.avgMAE.toFixed(2)+'°F' : 'n/a'}**\n` +
    `- Avg confidence: **${(stats.avgConf*100).toFixed(0)}%**\n\n` +
    `## Data\n\n` +
    `| Date | City | Tool | Range | NWS | FcstAvg | Actual | Δ° | Result | Conf | Notes |\n` +
    `|------|------|------|-------|-----|---------|--------|----|--------|------|-------|\n`;
  const body = rows.map(r => {
    const raw = r.raw || {};
    const d = (r.actual != null && r.toolHigh != null) ? (r.toolHigh - r.actual).toFixed(1) : '';
    let signals = '';
    if (raw.sentiment || raw.lean) {
      const lean = raw.lean || raw.sentiment;
      signals += `\n  - Sentiment: ${lean} | Season: ${raw.season} | Wind: ${raw.windDir||'—'} (7am: ${raw.windDir7am||'—'}) ${raw.windSpeedVal||raw.windSpeed||''}`;
      signals += `\n  - Pressure: ${raw.pressureLabel||'—'} ${raw.pressureChange||''} | Temp traj: ${raw.tempTrajectory||'—'} ${raw.tempRate||''}`;
      signals += `\n  - Dew pt: ${raw.dewPoint!=null?raw.dewPoint+'°':'—'} | Ovn low: ${raw.overnightLow!=null?raw.overnightLow+'°':'—'} | Cloud: ${raw.cloudCover||'—'} | Humid: ${raw.humidTrend||'—'} | Solar: ${raw.solar||'—'}`;
      // v2-only enrichments
      if (raw.schema === 'v2') {
        const models = [
          raw.hrrr   ? `HRRR ${raw.hrrr}`   : null,
          raw.gfs    ? `GFS ${raw.gfs}`     : null,
          raw.icon   ? `ICON ${raw.icon}`   : null,
          raw.nam    ? `NAM ${raw.nam}`     : null,
          raw.climb  ? `climb ${raw.climb}` : null,
        ].filter(Boolean).join(' · ');
        if (models) signals += `\n  - Models: ${models} | Consensus: ${raw.consensus||'—'} | NWS bias: ${raw.nwsBias||'—'}`;
        const aqi = raw.usAqi ? `AQI ${raw.usAqi}` : null;
        const pm  = raw.pm25 ? `PM2.5 ${raw.pm25}` : null;
        const aod = raw.aod  ? `AOD ${raw.aod}`   : null;
        const air = [aqi, pm, aod, raw.smoke && raw.smoke!=='none' ? `smoke:${raw.smoke}` : null].filter(Boolean).join(' · ');
        const rain = raw.rainDay === 'YES' ? ` | RAIN DAY (peak ${raw.precipMax||'?'})` : '';
        if (air || rain) signals += `\n  - Air: ${air||'—'}${rain}`;
        // Station-specific regime (KLAX: marine layer / Santa Ana / Catalina eddy; KPHX: monsoon)
        const regime = [
          raw.marineLayer ? `marine layer:${raw.marineLayer}` : null,
          raw.santaAna === 'YES' ? 'SANTA ANA' : null,
          raw.eddy && raw.eddy !== 'none' ? `Catalina eddy:${raw.eddy}` : null,
          raw.monsoon === 'YES' ? 'MONSOON' : null,
          raw.seaBreezeEta ? `sea breeze:${raw.seaBreezeEta}` : null,
        ].filter(Boolean).join(' | ');
        if (regime) signals += `\n  - Regime: ${regime}`;
        if (raw.biasMode) signals += `\n  - Bias mode: ${raw.biasMode}${raw.stationNotes ? ' | notes: '+raw.stationNotes : ''}`;
        // v2.16+ Kalshi EV summary (only present on stier9 rows with evaluated markets)
        if (raw.kalshiEval === 'YES') {
          const buys = `Y${raw.kalshiBuyYes||0}/N${raw.kalshiBuyNo||0}`;
          const skips = `skip:roi=${raw.kalshiSkipRoi||0}/other=${raw.kalshiSkipOther||0}`;
          const stake = `stake=${raw.kalshiStakePct||0}%`;
          const top = raw.kalshiTopBucket ? ` | top:${raw.kalshiTopBucket}°F ${raw.kalshiTopEv}¢` : '';
          const susp = parseInt(raw.kalshiSuspCount || 0) > 0 ? ` | ⚠${raw.kalshiSuspCount} extreme-P` : '';
          signals += `\n  - Kalshi: ${buys} ${skips} ${stake}${top}${susp}`;
          // Per-bucket detail (compact, one bucket per line)
          if (raw.kalshiBets && raw.kalshiBets.length > 0) {
            for (const b of raw.kalshiBets) {
              const action = b.action === 'BUYYES' ? 'BUY YES' : b.action === 'BUYNO' ? 'BUY NO' : b.action;
              const sizeStr = (b.action === 'BUYYES' || b.action === 'BUYNO') ? ` ${b.size}` : '';
              const evStr = b.evBuyYes != null && b.evBuyNo != null
                ? `EV(Y${b.evBuyYes>=0?'+':''}${b.evBuyYes}¢/N${b.evBuyNo>=0?'+':''}${b.evBuyNo}¢)` : '';
              signals += `\n    · ${b.label}°F: Y=${b.yesPrice}¢ N=${b.noPrice}¢ | yourP=${b.yourP}% edge=${b.edge>=0?'+':''}${b.edge}¢ | ${evStr} → ${action}${sizeStr}${b.suspicious?' ⚠':''}`;
            }
          }
        }
      }
    }
    return `| ${r.date} | ${r.city} | ${r.toolHigh ?? ''} | ${r.range ?? ''} | ${r.nws ?? ''} | ${r.fcstAvg ?? ''} | ${r.actual ?? ''} | ${d} | ${r.result} | ${r.conf != null ? (r.conf*100).toFixed(0)+'%' : ''} | ${(r.notes||'').replace(/\|/g,'\\|')}${signals} |`;
  }).join('\n');
  const prompt = `\n\n## Analysis prompt\n\nYou are a forecasting analyst. Review the table above and answer:\n` +
    `1. Which city does the tool forecast most accurately? Least?\n` +
    `2. Is the tool beating NWS and the forecast-average baselines?\n` +
    `3. What systematic bias (over/under) do you see? By city, by temperature range?\n` +
    `4. Does confidence correlate with accuracy?\n` +
    `5. Do any meteorological signals (pressure tendency, wind direction, temp trajectory, sentiment, model spread, AQI, rain-day flag, station regimes like marine layer / Santa Ana / Catalina eddy / monsoon) correlate with better or worse accuracy?\n` +
    `6. Recommend 3 concrete adjustments to the tool's logic based on the signals.\n`;
  return head + body + prompt;
}

function download(filename, text, mime='text/plain') {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

function exportRows(rows, format) {
  const stats = computeStats(rows);
  const stamp = new Date().toISOString().slice(0,10);
  if (format === 'json') {
    const exportRows = rows.map(r => ({ ...r, signals: r.raw || undefined }));
    download(`weather-tracker-${stamp}.json`,
      JSON.stringify({ generated: new Date().toISOString(), stats, rows: exportRows }, null, 2),
      'application/json');
  } else if (format === 'csv') {
    download(`weather-tracker-${stamp}.csv`, rowsToCSV(rows), 'text/csv');
  } else if (format === 'md') {
    download(`weather-tracker-${stamp}.md`, rowsToMarkdown(rows, stats), 'text/markdown');
  } else if (format === 'clipboard') {
    navigator.clipboard?.writeText(rowsToMarkdown(rows, stats));
  }
}

// ── Automation: one-click analyze via Claude ───────────────
async function autoAnalyze(rows) {
  const stats = computeStats(rows);
  const md = rowsToMarkdown(rows, stats);
  try {
    const reply = await window.claude.complete({
      messages: [{ role: 'user', content:
        `You are a weather-forecast analyst. Here's my tool tracker data:\n\n${md}\n\n` +
        `Give me a tight 5-bullet analysis: best/worst city, bias direction, vs NWS, confidence calibration, and one concrete recommendation. Plain text, no markdown headers.`
      }]
    });
    return reply;
  } catch (e) {
    return `Could not reach the analyzer: ${e.message}`;
  }
}

// ── Automation: auto-fill from NWS point forecast (demo mock) ─
// In production this would hit api.weather.gov /points/{lat,lon}/forecast.
// Here we simulate the round-trip so the button gives feedback.
async function autoFillForecast(row) {
  await new Promise(r => setTimeout(r, 600));
  const seed = (row.city.charCodeAt(0) + new Date(row.date).getDate()) % 10;
  const nws = Math.round((row.toolHigh ?? 75) - 1 + seed*0.2);
  const fcstAvg = Math.round(nws + (seed%3 === 0 ? -1 : 1));
  return { nws, fcstAvg };
}

// ── Automation: derive result from tool prediction + actual ──
function autoDeriveResult(row) {
  if (row.actual == null || row.toolHigh == null) return row.result;
  const m = String(row.range || '').match(/(\d+)\s*[-–]\s*(\d+)/);
  const diff = row.actual - row.toolHigh;
  if (Math.abs(diff) < 0.5) return 'On';
  if (m) {
    const [lo, hi] = [+m[1], +m[2]];
    if (row.actual >= lo && row.actual <= hi) return 'Within';
  } else if (Math.abs(diff) <= 1) return 'Within';
  return diff > 0 ? 'Over' : 'Under';
}

Object.assign(window, { exportRows, autoAnalyze, autoFillForecast, autoDeriveResult, rowsToCSV, rowsToMarkdown });

// ── ExportMenu — dropdown button used in both toolbars ─────────
function ExportMenu({ rows, dark, accent, hair, ink, mute, variant = 'arctic' }) {

}

<script type="text/babel">
// Arctic variation — airy modern spreadsheet
// and Terminal variation — dense forecast-ops cockpit.
// Both consume WEATHER_ROWS and share the same interactions:
// sort, inline edit, add/delete row, star, filter, bulk select.

const { useState, useMemo, useRef, useEffect } = React;

// ─── small utils shared across both variations ──────────────
function formatDate(iso, style = 'short') {
  const d = new Date(iso + 'T12:00:00');
  if (style === 'short') return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit' });
  if (style === 'code')  return iso.replace(/-/g,'·').slice(5);
  return iso;
}
function errOf(predicted, actual) {
  if (predicted == null || actual == null) return null;
  return Math.round((predicted - actual) * 10) / 10;
}
function useSortFilterStar(initialRows) {
  const [rows, setRows] = useState(initialRows);
  const [sortBy, setSortBy] = useState({ key: 'date', dir: 'desc' });
  const [filter, setFilter] = useState('');
  const [starred, setStarred] = useState(() => new Set());
  const [selected, setSelected] = useState(() => new Set());

  const toggleSort = (key) => {
    setSortBy(s => s.key === key ? { key, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'asc' });
  };
  const toggleStar = (id) => setStarred(s => {
    const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n;
  });
  const toggleSelect = (id) => setSelected(s => {
    const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n;
  });
  const updateCell = (id, key, value) => {
    setRows(rs => rs.map(r => r.id === id ? { ...r, [key]: value } : r));
  };
  const deleteSelected = () => {
    setRows(rs => rs.filter(r => !selected.has(r.id)));
    setSelected(new Set());
  };
  const addRow = () => {
    const nextId = (rows.length ? Math.max(...rows.map(r=>r.id)) : 0) + 1;
    const today = new Date().toISOString().slice(0,10);
    setRows(rs => [{
      id: nextId, date: today, city: 'Miami', toolHigh: null, range: '—',
      nws: null, fcstAvg: null, actual: null, result: 'Skip', conf: null, notes: ''
    }, ...rs]);
  };

  const visible = useMemo(() => {
    const q = filter.trim().toLowerCase();
    let out = rows;
    if (q) out = out.filter(r =>
      r.city.toLowerCase().includes(q) ||
      r.date.includes(q) ||
      (r.notes || '').toLowerCase().includes(q) ||
      r.result.toLowerCase().includes(q)
    );
    const { key, dir } = sortBy;
    out = [...out].sort((a, b) => {
      const av = a[key], bv = b[key];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      const cmp = (typeof av === 'number' && typeof bv === 'number') ? av - bv : String(av).localeCompare(String(bv));
      return dir === 'asc' ? cmp : -cmp;
    });
    return out;
  }, [rows, filter, sortBy]);

  return { rows, visible, sortBy, toggleSort, filter, setFilter,
           starred, toggleStar, selected, toggleSelect,
           updateCell, deleteSelected, addRow };
}

// Editable cell — click to edit, blur or Enter to commit.
function ECell({ value, onChange, align = 'left', type = 'text', placeholder = '—', style }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState('');
  const ref = useRef(null);
  useEffect(() => { if (editing && ref.current) { ref.current.focus(); ref.current.select(); } }, [editing]);
  const commit = () => {
    let v = draft;
    if (type === 'number') { const n = parseFloat(v); v = isNaN(n) ? null : n; }
    if (v !== value) onChange(v);
    setEditing(false);
  };
  if (editing) {
    return <input ref={ref} defaultValue={value ?? ''}
      onChange={(e) => setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={(e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
      style={{ width: '100%', border: 'none', outline: 'none', background: 'transparent',
               font: 'inherit', color: 'inherit', textAlign: align, padding: 0, ...style }} />;
  }
  return <span onClick={() => { setDraft(String(value ?? '')); setEditing(true); }}
    style={{ display: 'block', textAlign: align, cursor: 'text', minHeight: '1em',
             color: value == null || value === '' ? 'currentColor' : undefined,
             opacity: value == null || value === '' ? 0.35 : 1, ...style }}>
    {value == null || value === '' ? placeholder : value}
  </span>;
}

  const toggleSort = (key) => setSortBy(s =>
    s.key === key ? { key, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'desc' });
  const toggleStar = (id) => setStarred(s => { const n = new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const toggleSelect = (id) => setSelected(s => { const n = new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const updateCell = (id, k, v) => setRows(rs => rs.map(r => {
    if (r.id !== id) return r;
    const updated = { ...r, [k]: v };
    // auto-derive result whenever actual or toolHigh changes
    if (k === 'actual' || k === 'toolHigh') {
      updated.result = autoDeriveResult(updated);
    }
    return updated;
  }));
  const deleteSelected = () => { setRows(rs => rs.filter(r => !selected.has(r.id))); setSelected(new Set()); };
  const addRow = () => {
    const nextId = (rows.length ? Math.max(...rows.map(r=>r.id)) : 0) + 1;
    setRows(rs => [{ id: nextId, date: new Date().toISOString().slice(0,10), city:'',
      toolHigh:null, range:'', nws:null, fcstAvg:null, actual:null, result:'Skip', conf:null, notes:'' }, ...rs]);
  };

  const visible = useMemoT(() => {
    const q = filter.trim().toLowerCase();
    let out = rows;
    if (q) out = out.filter(r => r.city.toLowerCase().includes(q) || r.date.includes(q) ||
      (r.notes || '').toLowerCase().includes(q) || r.result.toLowerCase().includes(q));
    const { key, dir } = sortBy;
    out = [...out].sort((a,b) => {
      const av=a[key], bv=b[key];
      if (av==null && bv==null) return 0;
      if (av==null) return 1; if (bv==null) return -1;
      const cmp = (typeof av==='number' && typeof bv==='number') ? av-bv : String(av).localeCompare(String(bv));
      return dir==='asc' ? cmp : -cmp;
    });
    return out;
  }, [rows, filter, sortBy]);

  const stats = useMemoT(() => computeStats(rows), [rows]);

  // ── theme ────────────────────────────────
  const accent = tweaks.accent;
  const dark = tweaks.dark;
  const density = tweaks.density;
  const zebra = tweaks.zebra;
  const grid = tweaks.grid;

  const bg = dark ? '#0a0c10' : '#f4f1e8';
  const panel = dark ? '#10131a' : '#ebe6d6';
  const ink = dark ? '#d8dce4' : '#1f2128';
  const dim = dark ? '#6a7180' : '#7a7668';
  const rule = dark ? 'rgba(216,220,228,0.15)' : 'rgba(31,33,40,0.18)';
  const hilite = dark ? 'rgba(216,220,228,0.04)' : 'rgba(31,33,40,0.04)';
  const mono = '"Source Serif 4", Georgia, serif';
  const rowH = density === 'compact' ? 26 : 34;
  const cellFontSize = rowH - 10; // fills cell without altering its dimensions

  const toneColor = (tone) => {
    if (tone === 'good') return dark ? '#7fdda3' : '#2c7a4a';
    if (tone === 'ok')   return dark ? '#7eb8f5' : '#2456a8';
    if (tone === 'warn') return dark ? '#f5a37e' : '#a04b1c';
    return dim;
  };

  // Mini sparkline of daily tool error per city
  const errSeries = useMemoT(() => {
    const byCity = {};
    for (const r of rows) {
      if (r.actual == null || r.toolHigh == null) continue;
      (byCity[r.city] ||= []).push({ date: r.date, err: r.toolHigh - r.actual });
    }
    for (const c in byCity) byCity[c].sort((a,b) => a.date.localeCompare(b.date));
    return byCity;
  }, [rows]);

  const cols = [
    { key: 'date',     label: 'DATE',         align: 'center', w: 120 },
    { key: 'city',     label: 'CITY',         align: 'center', w: 72 },
    { key: 'toolHigh', label: 'TOOL',         align: 'center', w: 48 },
    { key: 'range',    label: 'RANGE',        align: 'center', w: 120 },
    { key: 'nws',      label: 'NWS FORECAST', align: 'center', w: 60 },
    { key: 'actual',   label: 'OBSERVED',     align: 'center', w: 48 },
    { key: 'toolHigh', label: 'Δ°',           align: 'center', w: 48, isErr: true },
    { key: 'conf',     label: 'CONFIDENCE',   align: 'center', w: 56 },
    { key: 'result',   label: 'RESULT',       align: 'center', w: 96 },
    { key: 'kalshi',   label: 'KALSHI',       align: 'left',   w: 180, isKalshi: true },
  ];

  const cellBorder = grid === 'none' ? 'none' : `1px solid ${rule}`;
  const rightOnly = grid === 'hairline' ? 'none' : cellBorder;

  return (
    <div style={{ background: bg, color: ink, fontFamily: mono, minHeight: '100%',
                  fontSize: density==='compact' ? 11.5 : 12.5,
                  fontFeatureSettings: '"ss01","zero"' }}>

      {/* ── command header ───────────────────── */}
      <div style={{ padding: '14px 20px 12px', borderBottom: `1px solid ${rule}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
          <span style={{ color: accent, fontWeight: 600 }}>▌</span>
          <span style={{ fontSize: 14.5, fontWeight: 600, letterSpacing: '0.02em' }}>
            WEATHER TOOL TRACKER · v2.17
          </span>
          <span style={{ color: dim }}>·</span>
          <span style={{ color: dim, fontSize: 12.5 }}>
            SESSION {new Date().toISOString().slice(0,10).replace(/-/g,'')}
          </span>
          <div style={{ flex: 1 }} />
          <span style={{ fontSize: 11.5, color: dim, letterSpacing: '0.1em' }}>
            <span style={{ color: toneColor('good') }}>●</span> SAVED
          </span>
          <span style={{ color: dim, fontSize: 11.5 }}>·</span>
          <span style={{ fontSize: 11.5, color: dim, letterSpacing: '0.1em' }}>
            <span style={{ color: toneColor('good') }}>●</span> ONLINE
          </span>
        </div>
        <div style={{ fontSize: 12.5, color: dim }}>
          <span style={{ color: accent }}>$</span> monitor --models=tool,nws,avg --cities={CITIES.join(',').toLowerCase()} --window=4d
        </div>
      </div>

      {/* ── telemetry strip ──────────────────── */}
      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr 1fr 1fr 1.4fr',
                    borderBottom: `1px solid ${rule}`, background: panel }}>
        {[
          { l: 'HIT RATE (On + Within)',  v: `${(stats.hitRate*100).toFixed(1)}%`,    bar: stats.hitRate },
          { l: 'ON POINT (exact match)',      v: `${(stats.onPointRate*100).toFixed(1)}%`, bar: stats.onPointRate },
          { l: 'TOOL MEAN ERROR',             v: stats.toolMAE != null ? `${stats.toolMAE.toFixed(2)}°F` : '—',          bar: stats.toolMAE != null ? Math.max(0, 1 - stats.toolMAE/4) : 0 },
          { l: 'NWS MEAN ERROR',              v: stats.nwsMAE  != null ? `${stats.nwsMAE.toFixed(2)}°F` : '—',           bar: stats.nwsMAE  != null ? Math.max(0, 1 - stats.nwsMAE/4)  : 0 },
          { l: 'ROWS',                        v: `${stats.tracked}  ·  skip: ${stats.skipped}`, bar: null },
        ].map((s, i, arr) => (
          <div key={i} style={{ padding: '12px 16px',
                                borderRight: i < arr.length - 1 ? `1px solid ${rule}` : 'none' }}>
            <div style={{ fontSize: 11.5, color: dim, letterSpacing: '0.14em', marginBottom: 5 }}>{s.l}</div>
            <div style={{ fontSize: 18.5, fontWeight: 600, color: ink, marginBottom: 6,
                          fontVariantNumeric: 'tabular-nums' }}>{s.v}</div>
            {s.bar != null && (
              <div style={{ display: 'flex', gap: 2 }}>
                {Array.from({length: 20}).map((_, j) => (
                  <div key={j} style={{ flex: 1, height: 6,
                    background: j < Math.round(s.bar*20) ? accent : rule }} />
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* ── tabs ────────────────────────────── */}
      <div style={{ display: 'flex', borderBottom: `1px solid ${rule}`, background: panel }}>
        {[['tracker','TRACKER'],['signals','SIGNALS'],['analysis','ANALYSIS']].map(([id, label]) => (
          <button key={id} onClick={() => setActiveTab(id)} style={{
            padding: '10px 20px', border: 'none', background: 'transparent',
            fontFamily: mono, fontSize: 11.5, fontWeight: 600, letterSpacing: '0.1em',
            cursor: 'pointer', color: activeTab === id ? accent : dim,
            borderBottom: `2px solid ${activeTab === id ? accent : 'transparent'}`,
            marginBottom: -1 }}>
            {label}
          </button>
        ))}
      </div>

      {activeTab === 'tracker' && <>
      {/* ── per-city on-point rate ───────────── */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 0, borderBottom: `1px solid ${rule}`, background: panel }}>
        <div style={{ fontSize: 11.5, color: dim, letterSpacing: '0.14em', padding: '8px 16px',
                      borderRight: `1px solid ${rule}`, whiteSpace: 'nowrap', display: 'flex', alignItems: 'center' }}>
          ON POINT BY CITY
        </div>
        {CITIES.map((city, i) => {
          const cityRows = rows.filter(r => r.city === city && r.result !== 'Skip' && r.actual != null);
          const onPoint = cityRows.filter(r => r.result === 'On').length;
          const rate = cityRows.length ? onPoint / cityRows.length : null;
          return (
            <div key={city} style={{ flex: '1 1 160px', minWidth: 160, padding: '8px 16px',
                                     borderRight: i < CITIES.length - 1 ? `1px solid ${rule}` : 'none',
                                     display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontWeight: 600 }}>{city}</span>
              <span style={{ color: dim, fontSize: 11.5 }}>
                {rate == null ? '—' : (
                  <span>
                    <span style={{ color: rate >= 0.7 ? toneColor('good') : rate >= 0.5 ? toneColor('ok') : toneColor('warn'),
                                   fontWeight: 600 }}>{(rate*100).toFixed(0)}%</span>
                    <span style={{ color: dim }}> ({onPoint}/{cityRows.length})</span>
                  </span>
                )}
              </span>
            </div>
          );
        })}
      </div>

      {/* ── toolbar ──────────────────── */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 20px',
                    borderBottom: `1px solid ${rule}`, background: bg }}>
        <span style={{ color: accent }}>›</span>
        <input value={filter} onChange={(e) => setFilter(e.target.value)}
          placeholder="filter: miami | la | phoenix | austin | philadelphia | atlanta | dallas | vegas | on | within …"
          style={{ flex: 1, maxWidth: 280, border: 'none', outline: 'none',
                   background: 'transparent', color: ink, font: 'inherit',
                   borderBottom: `1px dashed ${rule}`, padding: '2px 0' }} />
        {/* quick filter chips */}
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {['All', ...CITIES, 'On', 'Within', 'Over', 'Under', 'Skip'].map(chip => {
            const val = chip === 'All' ? '' : chip.toLowerCase();
            const active = chip === 'All' ? filter === '' : filter.toLowerCase() === val;
            return (
              <button key={chip} onClick={() => setFilter(active ? '' : val)} style={{
                padding: '2px 8px', border: `1px solid ${active ? accent : rule}`,
                background: active ? accent : 'transparent',
                color: active ? (dark ? '#0a0c10' : '#fff') : dim,
                fontFamily: mono, fontSize: 11.5, cursor: 'pointer', letterSpacing: '0.06em' }}>
                {chip.toUpperCase()}
              </button>
            );
          })}
        </div>
        <div style={{ flex: 1 }} />
        {selected.size > 0 && (
          <button onClick={deleteSelected} style={{
            padding: '3px 10px', border: `1px solid ${toneColor('warn')}`,
            background: 'transparent', color: toneColor('warn'), fontSize: 12.5,
            fontFamily: mono, cursor: 'pointer', letterSpacing: '0.06em' }}>
            [DELETE {selected.size}]
          </button>
        )}
        <button onClick={() => setShowPaste(true)} style={{
          padding: '4.5px 15px', border: `1px solid ${accent}`, background: accent,
          color: dark ? '#0a0c10' : '#fff', fontSize: 18.75, fontFamily: mono,
          cursor: 'pointer', fontWeight: 600, letterSpacing: '0.06em' }}>
          [PASTE LOG]
        </button>
        <button onClick={() => {
          // Map our cities to wethr.net market slugs. Falls back to the
          // homepage if no clear city dominates the visible rows.
          const WETHR_SLUGS = {
            // Single-station tools
            'Miami':'miami', 'KMIA':'miami',
            'LA':'losangeles', 'KLAX':'losangeles', 'Los Angeles':'losangeles',
            'Phoenix':'phoenix', 'KPHX':'phoenix',
            'Austin':'austin', 'KAUS':'austin',
            'San Antonio':'sanantonio', 'KSAT':'sanantonio',
            // Multi-station zone tools (added 2026-04-30)
            'Philadelphia':'philadelphia', 'KPHL':'philadelphia',
            'Washington DC':'washington', 'KDCA':'washington',
            'Atlanta':'atlanta', 'KATL':'atlanta',
            'Charlotte':'charlotte', 'KCLT':'charlotte',
            'Nashville':'nashville', 'KBNA':'nashville',
            'Dallas-Fort Worth':'dallas', 'KDFW':'dallas',
            'Las Vegas':'lasvegas', 'KLAS':'lasvegas',
            // Historical
            'NYC':'newyork', 'KJFK':'newyork', 'KNYC':'newyork',
            'Chicago':'chicago', 'KORD':'chicagoohare',
          };
          // Tally the visible (filtered) rows. If one city is ≥60% of them,
          // open its market page; otherwise open the homepage.
          const counts = {};
          visible.forEach(r => {
            const slug = WETHR_SLUGS[r.city] || WETHR_SLUGS[(r.raw||{}).station];
            if (slug) counts[slug] = (counts[slug] || 0) + 1;
          });
          const total = Object.values(counts).reduce((a,b)=>a+b, 0);
          const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
          const url = (top && total > 0 && top[1] / total >= 0.6)
            ? `https://wethr.net/market/${top[0]}`
            : 'https://wethr.net/';
          window.open(url, '_blank', 'noopener,noreferrer');
        }} title="Open wethr.net (jumps to a single city's market when visible rows are dominated by one city)"
        style={{
          padding: '4.5px 13px', border: `1px solid ${accent}`, background: 'transparent',
          color: accent, fontSize: 12.5, fontFamily: mono,
          cursor: 'pointer', fontWeight: 600, letterSpacing: '0.06em' }}>
          [WETHR ↗]
        </button>
        <ExportMenu rows={rows} dark={dark} accent={accent} hair={rule} ink={ink} mute={dim} variant="terminal" />
        <button onClick={addRow} style={{
          padding: '3px 10px', border: `1px solid ${accent}`, background: 'transparent',
          color: accent, fontSize: 12.5, fontFamily: mono,
          cursor: 'pointer', letterSpacing: '0.06em' }}>
          [+ NEW ROW]
        </button>
      </div>

      {/* ── table ───────────────────── */}
      <table style={{ width: '100%', borderCollapse: 'collapse',
                      tableLayout: 'auto', fontVariantNumeric: 'tabular-nums',
                      fontSize: cellFontSize, lineHeight: 1 }}>
        <thead>
          <tr style={{ background: panel, borderBottom: `1px solid ${rule}` }}>
            <th style={{ width: 26, padding: '6px 4px', borderRight: cellBorder }}>
              <input type="checkbox"
                checked={selected.size > 0 && selected.size === visible.length}
                onChange={(e) => {
                  if (e.target.checked) visible.forEach(r => toggleSelect(r.id));
                  else Array.from(selected).forEach(id => toggleSelect(id));
                }}
                style={{ accentColor: accent }} />
            </th>
            <th style={{ width: 22, padding: '6px 4px', borderRight: cellBorder,
                         fontSize: 11.5, color: dim }}>★</th>
            {cols.map((c, i) => (
              <th key={i} onClick={() => !c.isErr && toggleSort(c.key)}
                style={{ textAlign: c.align, padding: '7px 10px', minWidth: c.w,
                         fontSize: 11.5, fontWeight: 600, color: dim,
                         letterSpacing: '0.12em', cursor: c.isErr ? 'default' : 'pointer',
                         userSelect: 'none', borderRight: cellBorder, whiteSpace: 'nowrap' }}>
                {c.label}
                {!c.isErr && sortBy.key === c.key && (
                  <span style={{ color: accent, marginLeft: 4 }}>{sortBy.dir==='asc'?'↑':'↓'}</span>
                )}
              </th>
            ))}
            <th style={{ padding: '7px 10px', fontSize: 11.5, fontWeight: 600, color: dim,
                         letterSpacing: '0.12em', textAlign: 'center', whiteSpace: 'nowrap' }}>TREND</th>
            <th style={{ padding: '7px 10px', fontSize: 11.5, fontWeight: 600, color: dim,
                         letterSpacing: '0.12em', textAlign: 'center', width: '100%' }}>NOTES</th>
          </tr>
        </thead>
        <tbody>
          {visible.map((r, i) => {
            const meta = RESULT_META[r.result];
            const err = r.actual != null && r.toolHigh != null
              ? Math.round((r.toolHigh - r.actual)*10)/10 : null;
            const series = (errSeries[r.city] || []).slice(-8);
            return (
              <tr key={r.id} style={{
                height: rowH,
                background: selected.has(r.id)
                  ? (dark ? 'rgba(120,180,255,0.06)' : `color-mix(in oklch, ${accent} 10%, transparent)`)
                  : zebra && i % 2 === 1 ? hilite : 'transparent',
                borderBottom: grid === 'none' ? 'none' : `1px solid ${rule}`,
              }}>
                <td style={{ padding: '2px 4px', textAlign: 'center', borderRight: cellBorder }}>
                  <input type="checkbox" checked={selected.has(r.id)}
                    onChange={() => toggleSelect(r.id)} style={{ accentColor: accent }} />
                </td>
                <td style={{ padding: '2px 4px', textAlign: 'center', borderRight: cellBorder }}>
                  <span onClick={() => toggleStar(r.id)} style={{
                    cursor: 'pointer', color: starred.has(r.id) ? accent : dim,
                    opacity: starred.has(r.id) ? 1 : 0.3 }}>
                    {starred.has(r.id) ? '★' : '·'}
                  </span>
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center', color: dim, whiteSpace: 'nowrap' }}>
                  {r.date.slice(5)}
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center', fontWeight: 600 }}>
                  <ECell value={r.city} onChange={(v) => updateCell(r.id,'city',v)} align="center" />
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center',
                             color: accent, fontWeight: 600 }}>
                  <ECell value={r.toolHigh} type="number" align="center"
                    onChange={(v) => updateCell(r.id,'toolHigh',v)} />
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center',
                             color: dim, whiteSpace: 'nowrap' }}>
                  <ECell value={r.range} align="center"
                    onChange={(v) => updateCell(r.id,'range',v)} />
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center', color: dim }}>
                  <ECell value={r.nws} type="number" align="center"
                    onChange={(v) => updateCell(r.id,'nws',v)} />
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center', fontWeight: 600 }}>
                  <ECell value={r.actual} type="number" align="center"
                    onChange={(v) => updateCell(r.id,'actual',v)} />
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center',
                             color: err==null ? dim : toneColor(Math.abs(err)<=1?'good':Math.abs(err)<=2?'ok':'warn'),
                             fontWeight: 600 }}>
                  {err==null ? '—' : `${err>0?'+':''}${err}`}
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center' }}>
                  {r.conf != null ? (
                    <span style={{ color: dim }}>
                      <span style={{ color: accent, fontWeight: 600 }}>{(r.conf*100).toFixed(0)}</span>
                      <span style={{ fontSize: 11.5, marginLeft: 1 }}>%</span>
                    </span>
                  ) : <span style={{ color: dim, opacity: 0.5 }}>—</span>}
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'center' }}>
                  <span style={{ color: toneColor(meta.tone), fontWeight: 600,
                                 letterSpacing: '0.04em', fontSize: 12.5 }}>
                    {meta.dot} {r.result.toUpperCase()}
                  </span>
                </td>
                <td style={{ padding: '4px 10px', borderRight: cellBorder, textAlign: 'left',
                             color: dim, fontSize: 11.5, whiteSpace: 'nowrap',
                             overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 180 }}>
                  {(() => {
                    // v2.16: Kalshi summary cell
                    const k = r.raw;
                    if (!k || k.kalshiEval !== 'YES') return <span style={{opacity:0.4}}>—</span>;
                    const buys = `Y${k.kalshiBuyYes||0}/N${k.kalshiBuyNo||0}`;
                    const stake = k.kalshiStakePct ? ` ${k.kalshiStakePct}%` : '';
                    const top = (k.kalshiTopBucket && k.kalshiTopEv) ? ` · ${k.kalshiTopBucket}°F ${k.kalshiTopEv}¢` : '';
                    const susp = parseInt(k.kalshiSuspCount||0) > 0 ? ` ⚠${k.kalshiSuspCount}` : '';
                    return <span style={{color: ink}}>{buys}{stake}{top}{susp}</span>;
                  })()}
                </td>
                <td style={{ padding: '4px 10px', borderRight: rightOnly, textAlign: 'center' }}>
                  <Sparkline series={series} accent={accent} rule={rule} />
                </td>
                <td style={{ padding: '4px 10px', color: dim, fontSize: 12.5, textAlign: 'center',
                             whiteSpace: 'nowrap', overflow: 'hidden',
                             textOverflow: 'ellipsis' }}>
                  <ECell value={r.notes} placeholder="—"
                    onChange={(v) => updateCell(r.id,'notes',v)} align="center" />
                </td>
              </tr>
            );
          })}
          {visible.length === 0 && (
            <tr><td colSpan={11} style={{ padding: '40px 20px', textAlign: 'center',
                                          color: dim, fontSize: 13, fontStyle: 'italic' }}>
              {rows.length === 0 ? 'No rows yet. Use PASTE LOG to import from the weather tool, or click + ROW to add one manually.'
                : 'No rows match your filter.'}
            </td></tr>
          )}
        </tbody>
      </table>

      {/* ── status bar ─────────────── */}
      <div style={{ display: 'flex', gap: 18, padding: '8px 20px', borderTop: `1px solid ${rule}`,
                    fontSize: 11.5, color: dim, letterSpacing: '0.1em', background: panel }}>
        <span>SHOWING {visible.length}/{rows.length}</span>
        <span>SEL {selected.size}</span>
        <span>★ {starred.size}</span>
        <div style={{ flex: 1 }} />
        <span>sort: <span style={{ color: ink }}>{sortBy.key.replace(/_/g,' ')} {sortBy.dir}</span></span>
        <span>density: <span style={{ color: ink }}>{density}</span></span>
        <span onClick={() => { if(confirm('Reset to defaults? This will clear all saved data.')) { localStorage.removeItem('wx_tracker_rows'); setRows(WEATHER_ROWS); } }}
          style={{ color: dim, cursor: 'pointer', letterSpacing: '0.06em' }}>[RESET]</span>
      </div>
      </> /* end tracker tab */}

      {activeTab === 'signals' && (
        <SignalsTab rows={visible} accent={accent} dark={dark} ink={ink} dim={dim} rule={rule} panel={panel} mono={mono} />
      )}

      {activeTab === 'analysis' && (
        <AnalysisTab rows={visible} accent={accent} dark={dark} ink={ink} dim={dim} rule={rule} panel={panel} mono={mono} />
      )}

      {/* ── paste log modal ─────────── */}
      {showPaste && (
        <PasteLogModal
          accent={accent} dark={dark} bg={bg} panel={panel} ink={ink} dim={dim} rule={rule} mono={mono}
          onClose={() => setShowPaste(false)}
          onImport={(newRows) => {
            setRows(rs => {
              // Dedup by (date, city): if a parsed row matches an existing one,
              // update it in place (preserving id + any user edits to actual);
              // otherwise prepend with a fresh id.
              let maxId = Math.max(...rs.map(r => r.id), 0);
              const indexBy = new Map(rs.map((r, i) => [`${r.date}|${r.city}`, i]));
              const merged = [...rs];
              const inserts = [];
              for (const r of newRows) {
                const key = `${r.date}|${r.city}`;
                const idx = indexBy.get(key);
                if (idx != null) {
                  // Merge: preserve existing id, but use parsed values where new
                  // value is not null/empty (so blank cells don't clobber data).
                  const existing = merged[idx];
                  const mergedRow = { ...existing };
                  for (const [k, v] of Object.entries(r)) {
                    if (v !== null && v !== undefined && v !== '') mergedRow[k] = v;
                  }
                  merged[idx] = mergedRow;
                } else {
                  inserts.push({ ...r, id: ++maxId });
                }
              }
              return [...inserts, ...merged];
            });
            setShowPaste(false);
          }}
        />
      )}
    </div>
  );
}

function Sparkline({ series, accent, rule }) {
  if (!series.length) return <span style={{ color: rule, fontSize: 11.5 }}>—</span>;
  const vals = series.map(s => s.err);
  const mx = Math.max(3, ...vals.map(Math.abs));
  const w = 120, h = 18, step = w / Math.max(1, series.length - 1);
  const y = (v) => h/2 - (v/mx) * (h/2 - 2);
  const d = series.map((s, i) => `${i===0?'M':'L'}${(i*step).toFixed(1)},${y(s.err).toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <line x1="0" y1={h/2} x2={w} y2={h/2} stroke={rule} strokeDasharray="2 2" />
      <path d={d} stroke={accent} strokeWidth="1.3" fill="none" />
      {series.map((s, i) => (
        <circle key={i} cx={i*step} cy={y(s.err)} r="1.6" fill={accent} />
      ))}
    </svg>
  );
}

// ── Log parser ──────────────────────────────────────────────────
// Pipe-delimited log format from the bet tools (v2 / v1.x).
//
// V2 UNIFORM 56-FIELD SCHEMA (extends to 62 with Phase 1B fields):
//   - Single-station tools v2.2+ (KMIA, KLAX, KPHX) and v1.2+ (KAUS, KSAT) emit 62 fields
//   - Earlier single-station versions (v2.1, v1.1) and multi-station tools (mz1) emit 56 fields
//   - The first 56 fields are identical across all schemas
//
//  1=date   2=station 3=version 4=fetchET 5=offset 6=season
//  7=proj   8=range   9=lean    10=conf   11=noBet 12=thresh 13=signal
//  14=climb 15=climbCap 16=hrrr 17=gfs    18=nam   19=icon
//  20=nws   21=nwsBias  22=consensus
//  23=t7am  24=tFetch   25=dew  26=hum    27=w7am  28=wFetch  29=wSpd
//  30=wDeg  31=gust     32=cloud 33=seaBreeze
//  34=prsTend 35=prsDiff 36=tempTraj 37=tempRate 38=solar 39=humidTrend 40=precipProb
//  41=overnightLow 42=yAct 43=yFc 44=nwsTone 45=radar 46=smoke
//  47=usAqi 48=pm25 49=aod 50=ozone 51=no2
//  52=precipNow 53=precipMax 54=rainDay
//  55=biasMode 56=stationExtra/notes
//
//  --- Phase 1B fields (added 2026-04-30, optional in legacy logs) ---
//  57=automated_tag (rule-based: in-regime/out-of-regime/borderline)
//  58=afd_tag (AFD-based: same + 'unparseable')
//  59=combined_tag (hybrid AND-rule)
//  60=afd_office (e.g., MFL, PHI)
//  61=afd_scores (raw bull/bear)
//  62=tag_disagreement ('true' if 57 ≠ 58)
//
// Older v1.x layouts (kept-around legacy logs) parsed best-effort via fallback.
const STATION_MAP = {
  // Weather Tool v2.16: 5 stations on Kalshi
  KLAS:'Las Vegas', KLAX:'LA', KPHX:'Phoenix',
  KMIA:'Miami',     KPHL:'Philadelphia',
};

const parseTemp = (s) => {
  if (s == null) return null;
  const n = parseFloat(String(s).replace(/[^\d.\-+]/g, ''));
  return isNaN(n) ? null : n;
};

// Strip stray emoji/marker prefixes the bet tools sometimes prepend to no-bet text.
const stripPrefix = (s) => (s || '')
  .replace(/^[\s\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}🎯⚡🔥📋✓✗]+/u, '')
  .trim();

// Parse the per-station "extras" payload that lives in field 56.
// Format: "key:value; key:value; ..." (KLAX) or "key:value" (KPHX) or
// just a fetch-timing fallback string like "on-time" / "fetch +5min" when the
// station has no extras to emit (KMIA/KAUS/KSAT).
//
// Known keys per station:
//   KLAX  → ml (clear|burning|lingering|deep), sa (YES), eddy (none|weak|strong)
//   KPHX  → monsoon (YES)
//   others → no keys
const STATION_EXTRA_KEYS = new Set(['ml','sa','eddy','monsoon']);
function parseStationExtra(raw) {
  const out = { stationExtra: raw || '', stationNotes: '' };
  if (!raw) return out;
  // If it doesn't contain a colon at all, it's just fetch-timing notes.
  if (!raw.includes(':')) { out.stationNotes = raw; return out; }
  // Split on semicolons, each piece "key:value". Anything that doesn't match
  // the known-key pattern is treated as raw notes (defensive).
  let unmatched = [];
  raw.split(/\s*;\s*/).forEach(part => {
    const m = part.match(/^([a-z_]+)\s*:\s*(.*)$/i);
    if (m && STATION_EXTRA_KEYS.has(m[1].toLowerCase())) {
      const k = m[1].toLowerCase(), v = m[2].trim();
      if (k === 'ml')      out.marineLayer = v;
      else if (k === 'sa') out.santaAna    = v;        // 'YES' when present
      else if (k === 'eddy')   out.eddy    = v;
      else if (k === 'monsoon')out.monsoon = v;        // 'YES' when present
    } else if (part.trim()) {
      unmatched.push(part.trim());
    }
  });
  if (unmatched.length) out.stationNotes = unmatched.join('; ');
  return out;
}

// ── Kalshi bet detail blob parser (v2.16+ field 66) ──────────────────
// Decodes the per-bucket bet detail blob produced by weather-tool-v2.16.
// Format: each bucket separated by ~, fields within a bucket separated by ,
//   <label>:<yes¢>,<no¢>,P<your%>,K<kalshi%>,E<edge±¢>,EVy<±¢>/n<±¢>,
//   <action>,<size>,ROI<y%>/<n%>,<S|.>
// Returns array of bucket objects, or [] if blob empty/unparseable.
function parseKalshiBetBlob(blob) {
  if (!blob || typeof blob !== 'string' || !blob.trim()) return [];
  const buckets = [];
  for (const part of blob.split('~')) {
    const colonIdx = part.indexOf(':');
    if (colonIdx === -1) continue;
    const label = part.substring(0, colonIdx).trim();
    const rest = part.substring(colonIdx + 1).split(',').map(s => s.trim());
    if (rest.length < 10) continue;  // malformed
    const stripPrefix = (s, prefix) => s.startsWith(prefix) ? s.substring(prefix.length) : s;
    // EVy/n combined field: "EVy+8.5/n-9.4" → split on "/"
    const evField = rest[5];
    const evMatch = evField.match(/EVy([+\-]?[\d.]+)\/n([+\-]?[\d.]+)/);
    // ROI combined: "ROI8.2/-" or "ROI-/12.4"
    const roiField = rest[8];
    const roiMatch = roiField.match(/ROI([\d.\-]+)\/([\d.\-]+)/);
    const parseRoi = (v) => v === '-' ? null : parseFloat(v);
    buckets.push({
      label,
      yesPrice: parseFloat(rest[0]),
      noPrice: parseFloat(rest[1]),
      yourP: parseFloat(stripPrefix(rest[2], 'P')),
      kalshiP: parseFloat(stripPrefix(rest[3], 'K')),
      edge: parseFloat(stripPrefix(rest[4], 'E')),
      evBuyYes: evMatch ? parseFloat(evMatch[1]) : null,
      evBuyNo: evMatch ? parseFloat(evMatch[2]) : null,
      action: rest[6],   // BUYYES / BUYNO / SKIP
      size: rest[7],     // "15ct$14" if bet, else "lowEV"/"-"/"CAUT"
      yesROI: roiMatch ? parseRoi(roiMatch[1]) : null,
      noROI: roiMatch ? parseRoi(roiMatch[2]) : null,
      suspicious: rest[9] === 'S',
    });
  }
  return buckets;
}

function parseLogLine(line) {
  const p = line.split('|').map(s => s.trim());
  if (p.length < 10) return null;

  const date = p[0];
  if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return null;

  const station = p[1];
  const city = STATION_MAP[station] || station;

  // Schema detection: v2 uniform spec has 56 fields and a numeric/short version at p[2].
  // v1.x logs (KMIA v9, KLAX v1.5, KPHX v1.4 etc.) typically have <56 fields, with
  // version strings like "v9", "v1.5". Treat anything with >=50 fields AND a known
  // station code as v2; everything else falls back to legacy mapping.
  const v2Like = p.length >= 50 && /^[A-Z]{4}$/.test(station);

  let toolHigh, range, nws, conf, notes, raw;

  if (v2Like) {
    // ── V2 56-FIELD PARSE ──────────────────────────────────────
    toolHigh       = parseTemp(p[6]);                   // 7  proj
    range          = p[7] && p[7] !== '—' ? p[7] : '—'; // 8  range
    nws            = parseTemp(p[19]);                  // 20 nws
    const confStr  = p[9] || '';                        // 10 conf "MODERATE 75%"
    const confMatch= confStr.match(/(\d+)%/);
    conf           = confMatch ? parseInt(confMatch[1]) / 100 : null;

    // Notes prefer the no-bet line (field 11). If empty, fall back to lean+stationExtra.
    const noBet    = stripPrefix(p[10]);                // 11 noBet
    const lean     = p[8] || '';                        // 9  lean (BULLISH/BEARISH/NEUTRAL)
    const tail     = p[55] || '';                       // 56 stationExtra/notes
    notes          = noBet || (lean ? `${lean}${tail ? ' · '+tail : ''}` : tail);

    // Skip detection: any "NO BET" text, or skip-flagged confidence.
    const isSkip   = /no bet/i.test(noBet) || /skip/i.test(confStr);
    const result   = isSkip ? 'Skip' : 'Skip'; // settled later when actual is entered

    raw = {
      station,
      version:        p[2],
      fetchTime:      p[3],
      fetchMin:       p[4],
      season:         p[5],
      // Display/blend fields
      proj:           p[6],
      range:          p[7],
      sentiment:      p[8],
      lean:           p[8],
      confLabel:      p[9],
      noBet:          p[10],
      threshold:      p[11],
      signal:         p[12],
      // Model detail
      climb:          p[13],
      climbCap:       p[14],
      hrrr:           p[15],
      gfs:            p[16],
      nam:            p[17],
      icon:           p[18],
      nwsRaw:         p[19],
      nwsBias:        p[20],
      consensus:      p[21],
      // Conditions at fetch
      temp7am:        parseTemp(p[22]),
      currentTemp:    parseTemp(p[23]),
      dewPoint:       parseTemp(p[24]),
      humidity:       p[25],
      windDir7am:     p[26],
      windDir:        p[27],
      windSpeed:      p[28],
      windDeg:        p[29],
      windSpeedVal:   p[30],   // gust mph string used by signals tab
      cloudCover:     p[31],
      seaBreezeEta:   p[32],
      // Pressure / trajectory
      pressureLabel:  p[33],   // pressureTend dropdown (e.g. "rising_fast")
      pressureChange: p[34],   // hPa change e.g. "+0.7hPa"
      pressureTend:   p[33],   // duplicate alias for backward compat
      tempTrajectory: p[35],   // tempTraj dropdown
      tempRate:       p[36],   // computed °F/hr
      solar:          p[37],
      humidTrend:     p[38],
      precipProb:     p[39],
      overnightLow:   parseTemp(p[40]),
      yesterdayActual:   parseTemp(p[41]),
      yesterdayForecast: parseTemp(p[42]),
      nwsTone:        p[43],
      radar:          p[44],
      smoke:          p[45],
      // Air quality (v2)
      usAqi:          p[46],
      pm25:           p[47],
      aod:            p[48],
      ozone:          p[49],
      no2:            p[50],
      // Precip (v2)
      precipNow:      p[51],
      precipMax:      p[52],
      rainDay:        p[53],
      biasMode:       p[54],
      stationExtra:   p[55],
      // Station-specific extras parsed from field 56:
      //   KLAX → marineLayer, santaAna, eddy
      //   KPHX → monsoon
      //   KMIA/KAUS/KSAT → typically just fetch-timing notes (stationNotes)
      ...parseStationExtra(p[55]),
      // ── Phase 1B regime tagging (older v2 zone tools, fields 57-62) ──────
      // OR
      // ── v2.16 Kalshi EV summary + bet detail blob (fields 57-66) ─────────
      // The schemas overlap on field positions. Disambiguate by version (field 3):
      //   p[2] === 'stier9' → v2.16 S-TIER tool, parse Kalshi fields
      //   anything else      → legacy Phase 1B regime tags
      ...((p[2] === 'stier9') ? {
        // v2.16+ Kalshi EV fields (overrides any phase-1B placeholders)
        kalshiEval:        p.length >= 57 ? p[56]  : '',         // 57 'YES' or ''
        kalshiBuyYes:      p.length >= 58 ? p[57]  : '',         // 58 n_buy_yes count
        kalshiBuyNo:       p.length >= 59 ? p[58]  : '',         // 59 n_buy_no count
        kalshiSkipRoi:     p.length >= 60 ? p[59]  : '',         // 60 n_skip_roi count
        kalshiSkipOther:   p.length >= 61 ? p[60]  : '',         // 61 n_skip_other count
        kalshiStakePct:    p.length >= 62 ? p[61]  : '',         // 62 stake_pct (% of bankroll)
        kalshiTopBucket:   p.length >= 63 ? p[62]  : '',         // 63 top EV bucket label
        kalshiTopEv:       p.length >= 64 ? p[63]  : '',         // 64 top EV value (cents)
        kalshiSuspCount:   p.length >= 65 ? p[64]  : '',         // 65 actionable extreme-P count
        kalshiBetBlob:     p.length >= 66 ? p[65]  : '',         // 66 raw blob
        kalshiBets:        parseKalshiBetBlob(p.length >= 66 ? p[65] : ''), // parsed bucket array
        // For backward-compat: Phase 1B fields are unset on v2.16 rows
        automatedTag:      undefined,
        afdTag:            undefined,
        combinedTag:       undefined,
        afdOffice:         undefined,
        afdScores:         undefined,
        tagDisagreement:   undefined,
      } : {
        // Legacy Phase 1B regime tagging fields (added 2026-04-30 to multi-station tools)
        automatedTag:    p.length >= 57 ? p[56] : undefined,  // 57 rule-based: in-regime/out-of-regime/borderline
        afdTag:          p.length >= 58 ? p[57] : undefined,  // 58 AFD-based
        combinedTag:     p.length >= 59 ? p[58] : undefined,  // 59 hybrid AND-rule
        afdOffice:       p.length >= 60 ? p[59] : undefined,  // 60 NWS office (e.g., MFL, PHI)
        afdScores:       p.length >= 61 ? p[60] : undefined,  // 61 raw bull/bear ("bull=4;bear=2")
        tagDisagreement: p.length >= 62 ? p[61] : undefined,  // 62 'true' if rule and AFD disagree
        // Kalshi fields are absent on legacy rows
        kalshiEval:        '',
        kalshiBets:        [],
      }),
      schema:         'v2',
    };
    return { date, city, toolHigh, range, nws, fcstAvg: null, actual: null, conf, result, notes, raw };
  }

  // ── V1 LEGACY FALLBACK ─────────────────────────────────────
  // Old layout (pre-uniform): toolHigh appeared at field 14 in some builds.
  // Prefer field 7 (matches v2 proj position) then fall back to 14 / 7 / 6.
  toolHigh = parseTemp(p[6]) ?? parseTemp(p[13]);
  range    = p[7] && p[7] !== '—' ? p[7] : '—';
  nws      = parseTemp(p[19]) ?? parseTemp(p[41]);
  const confMatch = (p[9] || '').match(/(\d+)%/);
  conf     = confMatch ? parseInt(confMatch[1]) / 100 : null;
  notes    = stripPrefix(p[10] || '');
  const isSkip = /no bet/i.test(notes) || /skip/i.test(p[9] || '');
  const result = isSkip ? 'Skip' : 'Skip';

  raw = {
    station,
    version:       p[2],
    fetchTime:     p[3],
    fetchMin:      p[4],
    season:        p[5],
    currentTemp:   parseTemp(p[6]),
    sentiment:     p[8],
    lean:          p[8],
    windDir7am:    p[26] || p[25],
    windDir:       p[27] || p[26],
    windSpeed:     p[28] || p[27],
    windSpeedVal:  p[30] || p[29],
    dewPoint:      parseTemp(p[24]) ?? parseTemp(p[21]),
    overnightLow:  parseTemp(p[40]) ?? parseTemp(p[22]),
    precipProb:    p[39] || p[30],
    cloudCover:    p[31],
    pressureLabel: p[33],
    pressureChange:p[34],
    pressureTend:  p[33],
    tempTrajectory:p[35] || p[36],
    solar:         p[37],
    humidTrend:    p[38],
    schema:        'v1',
  };
  return { date, city, toolHigh, range, nws, fcstAvg: null, actual: null, conf, result, notes, raw };
}

// ── Markdown export importer ──────────────────────────────────
// Re-imports rows from a tracker markdown export (the file produced by
// "Export · Markdown" in the toolbar). Each row spans 1+ lines:
//   | YYYY-MM-DD | city | tool | range | nws | fcst | actual | Δ° | result | conf% | notes...
// followed by optional indented "  - Sentiment: ..." continuation lines, with
// the row terminated by a trailing " |" on the last line.
function parseMarkdownExport(text) {
  const lines = text.split('\n');
  const rows = [];
  const errors = [];

  // Find table region: header row → end of table (next ## section or EOF).
  let tableStart = -1, tableEnd = lines.length;
  for (let i = 0; i < lines.length; i++) {
    if (/^\|\s*Date\s*\|/i.test(lines[i])) { tableStart = i + 2; break; }
  }
  if (tableStart < 0) return { rows, errors: ['No table header found — expected "| Date | City | ..."'] };
  for (let i = tableStart; i < lines.length; i++) {
    if (/^##\s/.test(lines[i])) { tableEnd = i; break; }
  }

  const num = (s) => {
    if (!s || s === '—' || s === 'Skip') return null;
    const n = parseFloat(String(s).replace(/[^\d.\-+]/g, ''));
    return isNaN(n) ? null : n;
  };
  const isRowLine = (l) => /^\|\s*\d{4}-\d{2}-\d{2}\s*\|/.test(l);
  const nextIsContinuation = (j) => {
    while (j < tableEnd && /^\s*$/.test(lines[j])) j++;
    if (j >= tableEnd) return false;
    return /^\s+\S/.test(lines[j]) && !isRowLine(lines[j]);
  };

  let i = tableStart;
  while (i < tableEnd) {
    const line = lines[i];
    if (/^\s*$/.test(line) || !isRowLine(line)) { i++; continue; }

    const parts = line.split('|');
    if (parts.length < 12) {
      errors.push(`Line ${i+1}: only ${parts.length-1} cells, expected 11`);
      i++; continue;
    }
    const cells = parts.slice(1, 11).map(c => c.trim());
    let notes = parts.slice(11).join('|').trimEnd();

    let endIdx = i;
    if (/\s\|\s*$/.test(line) && !nextIsContinuation(i + 1)) {
      // Single-line row
      notes = notes.replace(/\s*\|\s*$/, '').trim();
    } else {
      // Multi-line: collect continuation lines until trailing " |" or next row
      let j = i + 1;
      while (j < tableEnd) {
        const next = lines[j];
        if (/^\s*$/.test(next)) { j++; continue; }
        if (isRowLine(next) || /^##\s/.test(next)) break;
        notes += '\n' + next.trimEnd();
        endIdx = j;
        if (/\s\|\s*$/.test(next)) { j++; break; }
        j++;
      }
      notes = notes.replace(/\s*\|\s*$/, '').trim();
    }

    const confM = (cells[9] || '').match(/(\d+)\s*%/);
    rows.push({
      date:     cells[0],
      city:     cells[1],
      toolHigh: num(cells[2]),
      range:    cells[3] === 'Skip' ? '' : cells[3],
      nws:      num(cells[4]),
      fcstAvg:  num(cells[5]),
      actual:   num(cells[6]),
      result:   cells[8] || 'Skip',
      conf:     confM ? parseInt(confM[1])/100 : null,
      notes,
    });
    i = endIdx + 1;
  }
  return { rows, errors };
}

function PasteLogModal({ accent, dark, bg, panel, ink, dim, rule, mono, onClose, onImport }) {
  const [text, setText] = useStateT('');
  const [preview, setPreview] = useStateT([]);
  const [errors, setErrors] = useStateT([]);
  const [format, setFormat] = useStateT('');  // 'log' | 'markdown' | ''

  const parse = (val) => {
    const trimmed = val.trim();
    if (!trimmed) { setPreview([]); setErrors([]); setFormat(''); return; }

    // Format auto-detection: markdown export starts with "# Weather Tool Tracker"
    // or contains a "| Date | City |" header row.
    const isMarkdown = /^#\s+Weather Tool Tracker/m.test(trimmed) ||
                       /^\|\s*Date\s*\|\s*City\s*\|/im.test(trimmed);

    if (isMarkdown) {
      const { rows, errors: errs } = parseMarkdownExport(val);
      setPreview(rows);
      setErrors(errs);
      setFormat('markdown');
      return;
    }

    // Pipe-delimited bet-tool log
    const lines = val.split('\n').map(l => l.trim()).filter(Boolean);
    const good = [], bad = [];
    lines.forEach((line, i) => {
      const r = parseLogLine(line);
      if (r) good.push(r);
      else if (line.length > 5) bad.push(`Line ${i+1}: could not parse`);
    });
    setPreview(good);
    setErrors(bad);
    setFormat('log');
  };

  const toneColor = (tone) => {
    if (tone === 'good') return dark ? '#7fdda3' : '#2c7a4a';
    if (tone === 'warn') return dark ? '#f5a37e' : '#a04b1c';
    return dim;
  };

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200,
                  background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
         onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div style={{ background: panel, border: `1px solid ${rule}`, width: 680, maxHeight: '85vh',
                    display: 'flex', flexDirection: 'column', fontFamily: mono,
                    boxShadow: '0 24px 80px rgba(0,0,0,0.5)' }}>

        {/* header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px',
                      borderBottom: `1px solid ${rule}` }}>
          <span style={{ color: accent, fontWeight: 600 }}>▌</span>
          <span style={{ color: ink, fontWeight: 600, fontSize: 13.5, letterSpacing: '0.06em' }}>PASTE LOG · PARSER</span>
          <span style={{ color: dim, fontSize: 11.5, marginLeft: 4 }}>
            — paste pipe-delimited log lines OR a tracker markdown export
          </span>
          <div style={{ flex: 1 }} />
          <button onClick={onClose} style={{ background: 'transparent', border: 'none',
            color: dim, cursor: 'pointer', fontFamily: mono, fontSize: 15.5 }}>✕</button>
        </div>

        {/* textarea */}

              e.preventDefault(); e.stopPropagation();

              reader.onload = (ev) => {
                const content = String(ev.target.result || '');

            style={{ width: '100%', height: 100, background: bg, border: `1px solid ${rule}`,

                            display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

                {format && (
                  <span style={{ color: accent, fontSize: 10.5, letterSpacing: '0.08em' }}>
                    {format === 'markdown' ? 'FORMAT: MARKDOWN EXPORT' : 'FORMAT: BET-TOOL LOG (56-field)'}
                  </span>
