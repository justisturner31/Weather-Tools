              </div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12.5 }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${rule}` }}>
                    {['DATE','CITY','TOOL°','RANGE','NWS°','CONF','RESULT','NOTES'].map(h => (
                      <th key={h} style={{ textAlign: 'left', padding: '4px 8px', fontSize: 10.5,
                                           color: dim, letterSpacing: '0.12em', fontWeight: 600 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {preview.map((r, i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${rule}`, opacity: 0.9 }}>
                      <td style={{ padding: '5px 8px', color: dim }}>{r.date.slice(5)}</td>
                      <td style={{ padding: '5px 8px', fontWeight: 600 }}>{r.city}</td>
                      <td style={{ padding: '5px 8px', color: accent, fontWeight: 600 }}>{r.toolHigh ?? '—'}</td>
                      <td style={{ padding: '5px 8px', color: dim, fontSize: 11.5 }}>{r.range}</td>
                      <td style={{ padding: '5px 8px', color: dim }}>{r.nws ?? '—'}</td>
                      <td style={{ padding: '5px 8px', color: dim }}>{r.conf != null ? `${(r.conf*100).toFixed(0)}%` : '—'}</td>
                      <td style={{ padding: '5px 8px', color: dim }}>{r.result}</td>
                      <td style={{ padding: '5px 8px', color: dim, fontSize: 11.5,
                                   maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {r.notes || '—'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>
          )}
        </div>

        {/* footer */}
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end',
                      padding: '10px 16px', borderTop: `1px solid ${rule}` }}>
          <button onClick={onClose} style={{
            padding: '5px 14px', border: `1px solid ${rule}`, background: 'transparent',
            color: dim, fontFamily: mono, fontSize: 12.5, cursor: 'pointer', letterSpacing: '0.06em' }}>
            [CANCEL]
          </button>
          <button onClick={() => preview.length > 0 && onImport(preview)}
            disabled={preview.length === 0}
            style={{ padding: '5px 16px', border: `1px solid ${accent}`, background: accent,
                     color: dark ? '#0a0c10' : '#fff', fontFamily: mono, fontSize: 12.5,
                     cursor: preview.length > 0 ? 'pointer' : 'not-allowed', fontWeight: 600,
                     letterSpacing: '0.06em', opacity: preview.length > 0 ? 1 : 0.4 }}>
            [IMPORT {preview.length} ROW{preview.length !== 1 ? 'S' : ''}]
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Kalshi bet outcome analysis ─────────────────────────────────
// Parse a bucket label like "≤84", "85-86", or "≥93" into {low, high}
// where low/high are inclusive Fahrenheit boundaries.
// Kalshi temperature buckets resolve based on the integer high temperature.
function parseBucketLabel(label) {
  if (!label) return null;
  const trimmed = String(label).trim();
  // ≤N or <=N
  let m = trimmed.match(/^(?:≤|<=)\s*(\d+)$/);
  if (m) return { low: -Infinity, high: parseInt(m[1]), kind: 'lte' };
  // ≥N or >=N
  m = trimmed.match(/^(?:≥|>=)\s*(\d+)$/);
  if (m) return { low: parseInt(m[1]), high: Infinity, kind: 'gte' };
  // N-M
  m = trimmed.match(/^(\d+)-(\d+)$/);
  if (m) return { low: parseInt(m[1]), high: parseInt(m[2]), kind: 'range' };
  return null;
}

// Did the actual high resolve YES for this bucket?
function bucketResolvedYes(bucketLabel, actual) {
  if (actual == null) return null;
  const range = parseBucketLabel(bucketLabel);
  if (!range) return null;
  // Kalshi bucket thresholds use the integer reported high.
  // Round to integer to match resolution behavior.
  const obs = Math.round(actual);
  return obs >= range.low && obs <= range.high;
}

// Compute outcome for a single bet recommendation.
// Returns 'WIN' | 'LOSS' | null (if action wasn't a bet OR actual unknown).
// Profit/loss in cents per contract (using prices logged at the time).
function computeBetOutcome(bet, actual) {
  if (actual == null) return { outcome: null, pl: null };
  const isYes = bet.action === 'BUYYES';
  const isNo = bet.action === 'BUYNO';
  if (!isYes && !isNo) return { outcome: null, pl: null };
  const yes = bucketResolvedYes(bet.label, actual);
  if (yes == null) return { outcome: null, pl: null };
  if (isYes) {
    // BUY YES at bet.yesPrice ¢. Profit = (100 - yesPrice) if YES wins, else -yesPrice.
    return yes
      ? { outcome: 'WIN', pl: 100 - bet.yesPrice }
      : { outcome: 'LOSS', pl: -bet.yesPrice };
  }
  // BUY NO at bet.noPrice ¢. Profit = (100 - noPrice) if NO wins (i.e. YES loses).
  return yes
    ? { outcome: 'LOSS', pl: -bet.noPrice }
    : { outcome: 'WIN', pl: 100 - bet.noPrice };
}

// Aggregate analysis across all rows. Returns:
//   { totalBets, wins, losses, pending, winRate, totalPL, byStation, byTier, calibration }
// where calibration = [{lo, hi, predicted, actual, n}] for histogram of yourP buckets.
function computeKalshiAnalysis(rows) {
  let totalBets = 0, wins = 0, losses = 0, pending = 0, totalPL = 0;
  let totalSizedBets = 0, sizedWins = 0, totalStakeCents = 0, plCents = 0;
  const byStation = {};
  const byTier = {};
  const calibBins = [
    { lo: 0,  hi: 10, label: '0-10%',  yes: 0, no: 0 },
    { lo: 10, hi: 20, label: '10-20%', yes: 0, no: 0 },
    { lo: 20, hi: 30, label: '20-30%', yes: 0, no: 0 },
    { lo: 30, hi: 40, label: '30-40%', yes: 0, no: 0 },
    { lo: 40, hi: 50, label: '40-50%', yes: 0, no: 0 },
    { lo: 50, hi: 60, label: '50-60%', yes: 0, no: 0 },
    { lo: 60, hi: 70, label: '60-70%', yes: 0, no: 0 },
    { lo: 70, hi: 80, label: '70-80%', yes: 0, no: 0 },
    { lo: 80, hi: 90, label: '80-90%', yes: 0, no: 0 },
    { lo: 90, hi:100, label: '90-100%', yes: 0, no: 0 },
  ];
  for (const r of rows) {
    const bets = r.raw?.kalshiBets;
    if (!bets || !bets.length) continue;
    const station = r.raw?.station || r.city;
    const tier = r.raw?.confLabel?.split(' ')[0] || 'UNKNOWN';
    // Calibration: every evaluated bucket contributes
    for (const b of bets) {
      const yes = bucketResolvedYes(b.label, r.actual);
      if (yes != null && b.yourP != null) {
        const pct = b.yourP;
        const bin = calibBins.find(x => pct >= x.lo && pct < x.hi) || calibBins[calibBins.length - 1];
        if (yes) bin.yes++; else bin.no++;
      }
    }
    // Bet outcomes
    for (const b of bets) {
      const isBet = b.action === 'BUYYES' || b.action === 'BUYNO';
      if (!isBet) continue;
      totalBets++;
      const { outcome, pl } = computeBetOutcome(b, r.actual);
      if (outcome === null) { pending++; continue; }
      if (outcome === 'WIN') wins++; else losses++;
      totalPL += pl;
      // Sized P&L: parse "15ct$14" → 15 contracts × pl cents = total cents
      const sizeMatch = String(b.size || '').match(/^(\d+)ct\$(\d+)/);
      if (sizeMatch) {
        const contracts = parseInt(sizeMatch[1]);
        if (contracts > 0) {
          totalSizedBets++;
          totalStakeCents += parseInt(sizeMatch[2]) * 100;
          plCents += pl * contracts;
          if (outcome === 'WIN') sizedWins++;
        }
      }
      // By station
      byStation[station] = byStation[station] || { bets:0, wins:0, losses:0, pl:0 };
      byStation[station].bets++;
      if (outcome === 'WIN') byStation[station].wins++; else byStation[station].losses++;
      byStation[station].pl += pl;
      // By tier
      byTier[tier] = byTier[tier] || { bets:0, wins:0, losses:0, pl:0 };
      byTier[tier].bets++;
      if (outcome === 'WIN') byTier[tier].wins++; else byTier[tier].losses++;
      byTier[tier].pl += pl;
    }
  }
  const settled = wins + losses;
  // Build calibration table with predicted vs actual rate
  const calibration = calibBins.map(b => {
    const n = b.yes + b.no;
    return {
      label: b.label,
      lo: b.lo, hi: b.hi,
      n,
      predicted: (b.lo + b.hi) / 2,
      actual: n > 0 ? (b.yes / n) * 100 : null,
    };
  });
  return {
    totalBets, wins, losses, pending, settled,
    winRate: settled > 0 ? wins / settled : null,
    totalPL,  // in cents per contract (assumes 1 contract per bet)
    totalSizedBets, sizedWins,
    plCents,  // in cents, accounting for actual contract sizes
    totalStakeCents,
    sizedWinRate: totalSizedBets > 0 ? sizedWins / totalSizedBets : null,
    roi: totalStakeCents > 0 ? (plCents / totalStakeCents) * 100 : null,
    byStation, byTier, calibration,
  };
}

// ── Analysis Tab ─────────────────────────────────────────────────
function AnalysisTab({ rows, accent, dark, ink, dim, rule, panel, mono }) {
  const analysis = React.useMemo(() => computeKalshiAnalysis(rows), [rows]);
  const evaluated = rows.filter(r => r.raw?.kalshiBets?.length).length;
  const withResult = rows.filter(r => r.raw?.kalshiBets?.length && r.actual != null).length;
  const cardBg = dark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)';
  const goodColor = dark ? '#6ee7b7' : '#067a5e';
  const badColor = dark ? '#fca5a5' : '#b9452a';
  const plColor = analysis.totalPL >= 0 ? goodColor : badColor;
  const sizedPlColor = analysis.plCents >= 0 ? goodColor : badColor;
  
  if (analysis.totalBets === 0) {
    return (
      <div style={{ padding: '40px', textAlign: 'center', color: dim, fontFamily: mono }}>
        <div style={{ fontSize: 14, marginBottom: 8 }}>No Kalshi bets to analyze yet.</div>
        <div style={{ fontSize: 12 }}>
          Evaluate Kalshi markets in the weather tool to populate the bet log.
          {evaluated > 0 && ` (${evaluated} fetches have bucket data but none have actuals yet.)`}
        </div>
      </div>
    );
  }
  
  return (
    <div style={{ padding: 16, fontFamily: mono, color: ink }}>
      
      {/* TOP-LEVEL STATS ROW */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginBottom: 24 }}>
        <Stat label="EVAL'D FETCHES" value={evaluated} sub={`${withResult} resolved`} dim={dim} bg={cardBg} ink={ink} mono={mono} />
        <Stat label="TOTAL BETS"     value={analysis.totalBets} sub={`${analysis.pending} pending`} dim={dim} bg={cardBg} ink={ink} mono={mono} />
        <Stat label="WIN RATE"       value={analysis.winRate != null ? `${(analysis.winRate*100).toFixed(1)}%` : '—'} 
              sub={`${analysis.wins}W / ${analysis.losses}L`} dim={dim} bg={cardBg} ink={ink} mono={mono} />
        <Stat label="P&L (1¢/ct)"    value={`${analysis.totalPL >= 0 ? '+' : ''}${analysis.totalPL}¢`}
              sub="cents/contract assumed 1 ct" dim={dim} bg={cardBg} ink={ink} mono={mono} valueColor={plColor} />
        <Stat label="SIZED P&L"      value={`${analysis.plCents >= 0 ? '+' : ''}$${(analysis.plCents/100).toFixed(2)}`}
              sub={`stake $${(analysis.totalStakeCents/100).toFixed(2)} · ROI ${analysis.roi != null ? analysis.roi.toFixed(1)+'%' : '—'}`}
              dim={dim} bg={cardBg} ink={ink} mono={mono} valueColor={sizedPlColor} />
      </div>
      
      {/* PERFORMANCE BY STATION */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 12, color: dim, letterSpacing: '0.12em', marginBottom: 8 }}>BY STATION</div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr style={{ color: dim, textAlign: 'left' }}>
              <th style={{ padding: '4px 12px' }}>STATION</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>BETS</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>WINS</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>LOSSES</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>WIN %</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>P&L (¢)</th>
            </tr>
          </thead>
          <tbody>
            {Object.entries(analysis.byStation)
              .sort((a,b) => b[1].bets - a[1].bets)
              .map(([station, s]) => {
                const settled = s.wins + s.losses;
                const wr = settled > 0 ? (s.wins / settled) * 100 : null;
                return (
                  <tr key={station} style={{ borderTop: `1px solid ${rule}` }}>
                    <td style={{ padding: '4px 12px', color: ink, fontWeight: 600 }}>{station}</td>
                    <td style={{ padding: '4px 12px', textAlign: 'right', color: dim }}>{s.bets}</td>
                    <td style={{ padding: '4px 12px', textAlign: 'right', color: goodColor }}>{s.wins}</td>
                    <td style={{ padding: '4px 12px', textAlign: 'right', color: badColor }}>{s.losses}</td>
                    <td style={{ padding: '4px 12px', textAlign: 'right', color: ink }}>
                      {wr != null ? `${wr.toFixed(1)}%` : '—'}
                    </td>
                    <td style={{ padding: '4px 12px', textAlign: 'right', color: s.pl >= 0 ? goodColor : badColor, fontWeight: 600 }}>
                      {s.pl >= 0 ? '+' : ''}{s.pl}
                    </td>
                  </tr>
                );
              })}
          </tbody>
        </table>
      </div>
      
      {/* PERFORMANCE BY TIER */}
      {Object.keys(analysis.byTier).length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, color: dim, letterSpacing: '0.12em', marginBottom: 8 }}>BY TIER</div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ color: dim, textAlign: 'left' }}>
                <th style={{ padding: '4px 12px' }}>TIER</th>
                <th style={{ padding: '4px 12px', textAlign: 'right' }}>BETS</th>
                <th style={{ padding: '4px 12px', textAlign: 'right' }}>WIN %</th>
                <th style={{ padding: '4px 12px', textAlign: 'right' }}>P&L (¢)</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(analysis.byTier)
                .sort((a,b) => b[1].bets - a[1].bets)
                .map(([tier, s]) => {
                  const settled = s.wins + s.losses;
                  const wr = settled > 0 ? (s.wins / settled) * 100 : null;
                  return (
                    <tr key={tier} style={{ borderTop: `1px solid ${rule}` }}>
                      <td style={{ padding: '4px 12px', color: ink }}>{tier}</td>
                      <td style={{ padding: '4px 12px', textAlign: 'right', color: dim }}>{s.bets}</td>
                      <td style={{ padding: '4px 12px', textAlign: 'right', color: ink }}>
                        {wr != null ? `${wr.toFixed(1)}%` : '—'}
                      </td>
                      <td style={{ padding: '4px 12px', textAlign: 'right', color: s.pl >= 0 ? goodColor : badColor, fontWeight: 600 }}>
                        {s.pl >= 0 ? '+' : ''}{s.pl}
                      </td>
                    </tr>
                  );
                })}
            </tbody>
          </table>
        </div>
      )}
      
      {/* CALIBRATION */}
      <div>
        <div style={{ fontSize: 12, color: dim, letterSpacing: '0.12em', marginBottom: 4 }}>CALIBRATION</div>
        <div style={{ fontSize: 11, color: dim, marginBottom: 8 }}>
          For each bucket where the tool predicted P, what fraction actually resolved YES?
          Well-calibrated if predicted ≈ actual. Diagonal line = perfect calibration.
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr style={{ color: dim, textAlign: 'left' }}>
              <th style={{ padding: '4px 12px' }}>PREDICTED</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>N BUCKETS</th>
              <th style={{ padding: '4px 12px', textAlign: 'right' }}>ACTUAL HIT RATE</th>
              <th style={{ padding: '4px 12px' }}>DELTA</th>
            </tr>
          </thead>
          <tbody>
            {analysis.calibration.map(c => {
              if (c.n === 0) return null;
              const delta = c.actual != null ? c.actual - c.predicted : null;
              const deltaColor = delta == null ? dim
                : Math.abs(delta) < 5 ? goodColor
                : Math.abs(delta) < 10 ? (dark ? '#fbbf24' : '#b87000')
                : badColor;
              return (
                <tr key={c.label} style={{ borderTop: `1px solid ${rule}` }}>
                  <td style={{ padding: '4px 12px', color: ink }}>{c.label}</td>
                  <td style={{ padding: '4px 12px', textAlign: 'right', color: dim }}>{c.n}</td>
                  <td style={{ padding: '4px 12px', textAlign: 'right', color: ink }}>
                    {c.actual != null ? `${c.actual.toFixed(1)}%` : '—'}
                  </td>
                  <td style={{ padding: '4px 12px', color: deltaColor, fontWeight: 600 }}>
                    {delta != null ? `${delta >= 0 ? '+' : ''}${delta.toFixed(1)}pp` : '—'}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{ fontSize: 11, color: dim, marginTop: 8 }}>
          Δ &lt; 5pp = well-calibrated · 5-10pp = slight miscalibration · &gt; 10pp = overconfident or underconfident
        </div>
      </div>
      
    </div>
  );
}

// Small stat card component

    <div style={{ background: bg, padding: 12, borderRadius: 4, fontFamily: mono }}>
      <div style={{ fontSize: 10.5, color: dim, letterSpacing: '0.12em', marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 600, color: valueColor || ink, marginBottom: 4 }}>{value}</div>
      <div style={{ fontSize: 11, color: dim }}>{sub}</div>
    </div>
  );
}

  const rowsWithRaw = rows.filter(r => r.raw);
  // All 66 tracker fields, grouped logically. Each column shows the raw field
  // exactly as the tool emits it. Fields not produced by current tool show '—'.
  const signalCols = [
    // ── Identity (fields 1-5) ──────────────────────────────────────
    { key: 'date',          label: 'DATE' },
    { key: 'city',          label: 'CITY' },
    { key: 'station',       label: 'STATION',     get: r => r.raw?.station || '—' },

    // ── Forecast / projection (fields 7-12) ────────────────────────
    { key: 'proj',          label: 'PROJ',        get: r => r.raw?.proj || '—' },
    { key: 'range',         label: 'RANGE',       get: r => r.raw?.range || '—' },
    { key: 'lean',          label: 'SENTIMENT',   get: r => r.raw?.lean || r.raw?.sentiment },
    { key: 'confLabel',     label: 'CONF LABEL',  get: r => r.raw?.confLabel || '—' },
    { key: 'noBet',         label: 'NO BET',      get: r => r.raw?.noBet || '—' },
    { key: 'threshold',     label: 'THRESHOLD',   get: r => r.raw?.threshold || '—' },
    { key: 'signal',        label: 'SIGNAL',      get: r => r.raw?.signal || '—' },
    // ── Models (fields 13-21) ──────────────────────────────────────
    { key: 'climb',         label: 'CLIMB',       get: r => r.raw?.climb },

    { key: 'hrrr',          label: 'HRRR',        get: r => r.raw?.hrrr },
    { key: 'gfs',           label: 'GFS',         get: r => r.raw?.gfs },
    { key: 'nam',           label: 'NAM',         get: r => r.raw?.nam },
    { key: 'icon',          label: 'ICON',        get: r => r.raw?.icon },
    { key: 'nwsRaw',        label: 'NWS RAW',     get: r => r.raw?.nwsRaw },
    { key: 'nwsBias',       label: 'NWS BIAS',    get: r => r.raw?.nwsBias },
    { key: 'consensus',     label: 'CONSENSUS',   get: r => r.raw?.consensus },
    // ── Conditions at fetch (fields 22-32) ─────────────────────────
    { key: 'temp7am',       label: 'TEMP 7AM',    get: r => r.raw?.temp7am != null ? `${r.raw.temp7am}°` : '—' },
    { key: 'currentTemp',   label: 'TEMP @ FETCH',get: r => r.raw?.currentTemp != null ? `${r.raw.currentTemp}°` : '—' },
    { key: 'dewPoint',      label: 'DEW PT',      get: r => r.raw?.dewPoint != null ? `${r.raw.dewPoint}°` : '—' },
    { key: 'humidity',      label: 'HUMIDITY',    get: r => r.raw?.humidity },
    { key: 'windDir7am',    label: 'WIND 7AM',    get: r => r.raw?.windDir7am },
    { key: 'windDir',       label: 'WIND DIR',    get: r => r.raw?.windDir },
    { key: 'windSpeed',     label: 'WIND SPEED',  get: r => r.raw?.windSpeed },
    { key: 'windDeg',       label: 'WIND DEG',    get: r => r.raw?.windDeg },
    { key: 'windSpeedVal',  label: 'GUST',        get: r => r.raw?.windSpeedVal },
    { key: 'cloudCover',    label: 'CLOUD',       get: r => r.raw?.cloudCover },
    { key: 'seaBreezeEta',  label: 'SEA BRZ',     get: r => r.raw?.seaBreezeEta },
    // ── Pressure / trajectory (fields 33-41) ───────────────────────
    { key: 'pressureLabel', label: 'PRES TEND',   get: r => r.raw?.pressureLabel },
    { key: 'pressureChange',label: 'Δ PRESSURE',  get: r => r.raw?.pressureChange },
    { key: 'tempTrajectory',label: 'TEMP TRAJ',   get: r => r.raw?.tempTrajectory },
    { key: 'tempRate',      label: '°F/HR',       get: r => r.raw?.tempRate },
    { key: 'solar',         label: 'SOLAR',       get: r => r.raw?.solar },
    { key: 'humidTrend',    label: 'HUMID TREND', get: r => r.raw?.humidTrend },
    { key: 'precipProb',    label: 'PRECIP%',     get: r => r.raw?.precipProb },
    { key: 'overnightLow',  label: 'OVN LOW',     get: r => r.raw?.overnightLow != null ? `${r.raw.overnightLow}°` : '—' },
    // ── Yesterday / NWS (fields 42-45) ─────────────────────────────
    { key: 'yesterdayActual',  label: 'YEST ACT',  get: r => r.raw?.yesterdayActual != null ? `${r.raw.yesterdayActual}°` : '—' },
    { key: 'yesterdayForecast',label: 'YEST FCST', get: r => r.raw?.yesterdayForecast != null ? `${r.raw.yesterdayForecast}°` : '—' },
    { key: 'nwsTone',       label: 'NWS TONE',    get: r => r.raw?.nwsTone },
    { key: 'radar',         label: 'RADAR',       get: r => r.raw?.radar },
    // ── Air quality (fields 46-51) ─────────────────────────────────
    { key: 'smoke',         label: 'SMOKE',       get: r => r.raw?.smoke },
    { key: 'usAqi',         label: 'AQI',         get: r => r.raw?.usAqi },
    { key: 'pm25',          label: 'PM2.5',       get: r => r.raw?.pm25 },
    { key: 'aod',           label: 'AOD',         get: r => r.raw?.aod },
    { key: 'ozone',         label: 'OZONE',       get: r => r.raw?.ozone },
    { key: 'no2',           label: 'NO₂',         get: r => r.raw?.no2 },
    // ── Precipitation (fields 52-54) ───────────────────────────────
    { key: 'precipNow',     label: 'PRECIP NOW',  get: r => r.raw?.precipNow },
    { key: 'precipMax',     label: 'PRECIP MAX',  get: r => r.raw?.precipMax },
    { key: 'rainDay',       label: 'RAIN',        get: r => r.raw?.rainDay },
    // ── Bias mode + station extras (fields 55-56) ──────────────────
    { key: 'biasMode',      label: 'BIAS MODE',   get: r => r.raw?.biasMode },
    { key: 'stationExtra',  label: 'STATION_EXTRA',get: r => r.raw?.stationExtra },
    // ── Station-specific regimes parsed from field 56 ──────────────
    { key: 'marineLayer',   label: 'MARINE LYR',  get: r => r.raw?.marineLayer },
    { key: 'santaAna',      label: 'SANTA ANA',   get: r => r.raw?.santaAna },
    { key: 'eddy',          label: 'EDDY',        get: r => r.raw?.eddy },
    { key: 'monsoon',       label: 'MONSOON',     get: r => r.raw?.monsoon },
    // ── v2.16 Kalshi EV summary (fields 57-65) ─────────────────────
    { key: 'kalshiEval',     label: 'KALSHI?',     get: r => r.raw?.kalshiEval || '—' },
    { key: 'kalshiBuyYes',   label: 'BUY YES',     get: r => r.raw?.kalshiBuyYes ?? '—' },
    { key: 'kalshiBuyNo',    label: 'BUY NO',      get: r => r.raw?.kalshiBuyNo ?? '—' },
    { key: 'kalshiSkipRoi',  label: 'SKIP ROI',    get: r => r.raw?.kalshiSkipRoi ?? '—' },
    { key: 'kalshiSkipOther',label: 'SKIP OTHER',  get: r => r.raw?.kalshiSkipOther ?? '—' },
    { key: 'kalshiStakePct', label: 'STAKE %',     get: r => r.raw?.kalshiStakePct ? `${r.raw.kalshiStakePct}%` : '—' },
    { key: 'kalshiTopBucket',label: 'TOP BUCKET',  get: r => r.raw?.kalshiTopBucket || '—' },
    { key: 'kalshiTopEv',    label: 'TOP EV',      get: r => r.raw?.kalshiTopEv ? `${r.raw.kalshiTopEv}¢` : '—' },
    { key: 'kalshiSuspCount',label: '⚠ SUSP',      get: r => r.raw?.kalshiSuspCount ?? '—' },
    // ── v2.16 bet detail blob count (field 66) ─────────────────────
    { key: 'kalshiBetsCount',label: '# BETS',      get: r => r.raw?.kalshiBets?.length ?? '—' },
    // ── Result ─────────────────────────────────────────────────────
    { key: 'result',        label: 'RESULT' },
  ];

  const sentimentColor = (s) => {
    if (!s) return dim;
    if (/bullish/i.test(s)) return dark ? '#7fdda3' : '#2c7a4a';
    if (/bearish/i.test(s)) return dark ? '#f5a37e' : '#a04b1c';
    return dim;
  };

  if (rowsWithRaw.length === 0) return (
    <div style={{ padding: '60px 20px', textAlign: 'center', color: dim, fontFamily: mono, fontSize: 13 }}>
      No signal data yet — paste a log to populate this tab.
    </div>
  );

  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: mono,
                      fontSize: 12.5, fontVariantNumeric: 'tabular-nums' }}>
        <thead>
          <tr style={{ background: panel, borderBottom: `1px solid ${rule}` }}>
            {signalCols.map(c => (
              <th key={c.key} style={{ padding: '8px 12px', textAlign: 'center', whiteSpace: 'nowrap',
                                       fontSize: 10.5, fontWeight: 600, color: dim, letterSpacing: '0.1em',
                                       borderRight: `1px solid ${rule}` }}>
                {c.label}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rowsWithRaw.map((r, i) => {
            const bets = r.raw?.kalshiBets || [];
            return (
              <React.Fragment key={r.id}>
                <tr style={{ borderBottom: bets.length ? 'none' : `1px solid ${rule}`,
                             background: i % 2 === 1 ? (dark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)') : 'transparent' }}>
                  {signalCols.map(c => {
                    const val = c.get ? c.get(r) : r[c.key];
                    const isSentiment = c.key === 'sentiment';
                    const isResult = c.key === 'result';
                    const hotRegime =
                      (c.key === 'santaAna' && val === 'YES') ||
                      (c.key === 'monsoon'  && val === 'YES') ||
                      (c.key === 'rainDay'  && val === 'YES') ||
                      (c.key === 'marineLayer' && val === 'deep') ||
                      (c.key === 'eddy' && val === 'strong');
                    const regimeColor = hotRegime ? (dark ? '#f5a37e' : '#a04b1c') : null;
                    return (
                      <td key={c.key} style={{ padding: '6px 12px', textAlign: 'center', whiteSpace: 'nowrap',
                                               borderRight: `1px solid ${rule}`,
                                               color: regimeColor || (isSentiment ? sentimentColor(val) : isResult ? accent : dim),
                                               fontWeight: regimeColor || isSentiment || isResult ? 600 : 400 }}>
                        {val || '—'}
                      </td>
                    );
                  })}
                </tr>
                {bets.length > 0 && (
                  <tr style={{ borderBottom: `1px solid ${rule}`,
                               background: dark ? 'rgba(167,139,250,0.04)' : 'rgba(167,139,250,0.05)' }}>
                    <td colSpan={signalCols.length} style={{ padding: '4px 12px 8px 12px', fontSize: 11.5, fontFamily: mono }}>
                      <div style={{ color: dim, marginBottom: 4, letterSpacing: '0.06em' }}>
                        ↳ KALSHI BUCKET DETAIL · {r.date} · {r.city} · proj {r.raw?.proj || '—'}°F · {r.raw?.confLabel || ''}
                      </div>
                      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
                        <thead>
                          <tr style={{ color: dim, textAlign: 'left' }}>
                            <th style={{ padding: '2px 8px' }}>BUCKET</th>
                            <th style={{ padding: '2px 8px' }}>YES¢</th>
                            <th style={{ padding: '2px 8px' }}>NO¢</th>
                            <th style={{ padding: '2px 8px' }}>YOUR P</th>
                            <th style={{ padding: '2px 8px' }}>KALSHI P</th>
                            <th style={{ padding: '2px 8px' }}>EDGE</th>
                            <th style={{ padding: '2px 8px' }}>EV YES</th>
                            <th style={{ padding: '2px 8px' }}>EV NO</th>
                            <th style={{ padding: '2px 8px' }}>ROI Y/N</th>
                            <th style={{ padding: '2px 8px' }}>ACTION</th>
                            <th style={{ padding: '2px 8px' }}>SIZE</th>
                            <th style={{ padding: '2px 8px' }}>⚠</th>
                          </tr>
                        </thead>
                        <tbody>
                          {bets.map((b, bi) => {
                            const isBet = b.action === 'BUYYES' || b.action === 'BUYNO';
                            const actionDisplay = b.action === 'BUYYES' ? 'BUY YES'
                              : b.action === 'BUYNO' ? 'BUY NO'
                              : b.action;
                            const actionColor = b.action === 'BUYYES' ? (dark ? '#6ee7b7' : '#067a5e')
                              : b.action === 'BUYNO' ? (dark ? '#fca5a5' : '#b9452a')
                              : dim;
                            const fmt = (n) => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(1);
                            return (
                              <tr key={bi} style={{ background: bi % 2 === 1 ? (dark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)') : 'transparent' }}>
                                <td style={{ padding: '2px 8px', color: ink, fontWeight: 600 }}>{b.label}°F</td>
                                <td style={{ padding: '2px 8px', color: dim }}>{b.yesPrice}</td>
                                <td style={{ padding: '2px 8px', color: dim }}>{b.noPrice}</td>
                                <td style={{ padding: '2px 8px', color: ink }}>{b.yourP}%</td>
                                <td style={{ padding: '2px 8px', color: dim }}>{b.kalshiP}%</td>
                                <td style={{ padding: '2px 8px', color: b.edge >= 0 ? (dark ? '#6ee7b7' : '#067a5e') : (dark ? '#fca5a5' : '#b9452a'), fontWeight: 500 }}>
                                  {fmt(b.edge)}¢
                                </td>
                                <td style={{ padding: '2px 8px', color: b.evBuyYes != null && b.evBuyYes >= 0 ? (dark ? '#6ee7b7' : '#067a5e') : dim }}>
                                  {fmt(b.evBuyYes)}¢
                                </td>
                                <td style={{ padding: '2px 8px', color: b.evBuyNo != null && b.evBuyNo >= 0 ? (dark ? '#6ee7b7' : '#067a5e') : dim }}>
                                  {fmt(b.evBuyNo)}¢
                                </td>
                                <td style={{ padding: '2px 8px', color: dim }}>
                                  {b.yesROI != null ? `${b.yesROI.toFixed(1)}%` : '—'} / {b.noROI != null ? `${b.noROI.toFixed(1)}%` : '—'}
                                </td>
                                <td style={{ padding: '2px 8px', color: actionColor, fontWeight: isBet ? 700 : 400 }}>
                                  {actionDisplay}
                                </td>
                                <td style={{ padding: '2px 8px', color: ink }}>{b.size}</td>
                                <td style={{ padding: '2px 8px', color: b.suspicious ? (dark ? '#fbbf24' : '#b87000') : dim, fontWeight: b.suspicious ? 700 : 400 }}>
                                  {b.suspicious ? '⚠' : '·'}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

window.TerminalTracker = TerminalTracker;

</script>

<script type="text/babel">
  function Root() {
    const [tweaks, setTweaks] = React.useState(() => ({ ...window.TWEAKS }));
    React.useEffect(() => window.subscribeTweaks((t) => setTweaks(t)), []);
    return <TerminalTracker tweaks={tweaks} />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
